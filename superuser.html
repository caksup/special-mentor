<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Superadmin - Jatirogo Creative Hub</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #1e293b;"> <div class="app-wrapper">
        <nav class="navbar navbar-expand navbar-dark bg-dark shadow-sm mb-4 border-bottom border-secondary">
            <div class="container-fluid px-3">
                <a class="navbar-brand fw-bold text-white" href="#">
                    <i class="bi bi-cpu-fill text-primary me-2"></i> KONTROL SUPERADMIN
                </a>
                <div class="d-flex align-items-center">
                    <span id="userNameDisplay" class="fw-bold me-3 text-light" style="font-size: 0.9rem;">Memuat...</span>
                    <button id="btnLogout" class="btn btn-outline-danger btn-sm fw-bold">
                        <i class="bi bi-power"></i> Keluar
                    </button>
                </div>
            </div>
        </nav>

        <div class="container pb-5">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-8">
                    
                    <div class="card card-custom p-4 shadow-lg border-0 mb-4">
                        <div class="text-center mb-4">
                            <h4 class="fw-bold text-dark"><i class="bi bi-broadcast me-2"></i> Pusat Transmisi Informasi</h4>
                            <p class="text-muted small">Apa yang Anda ketik dan simpan di sini akan langsung disiarkan ke halaman depan dan halaman mentor secara real-time.</p>
                        </div>

                        <hr>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-primary"><i class="bi bi-calendar-event me-2"></i> 1. Jadwal (Tampil di Halaman Login Depan)</label>
                            <textarea id="inputJadwal" class="form-control bg-light border-primary border-opacity-25" rows="3" placeholder="Ketik jadwal hari ini..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-info"><i class="bi bi-megaphone-fill me-2"></i> 2. Notif Briefing (Tampil di Dashboard Mentor)</label>
                            <textarea id="inputBriefing" class="form-control bg-light border-info border-opacity-25" rows="2" placeholder="Ketik arahan briefing sebelum kelas..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-warning"><i class="bi bi-exclamation-triangle-fill me-2"></i> 3. Catatan Penting (Tampil di Dashboard Mentor)</label>
                            <textarea id="inputCatatan" class="form-control bg-light border-warning border-opacity-25" rows="2" placeholder="Peringatan atau info krusial..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-success"><i class="bi bi-flag-fill me-2"></i> 4. Goal Kelas Harian (Tampil di Dashboard Mentor)</label>
                            <textarea id="inputGoal" class="form-control bg-light border-success border-opacity-25" rows="2" placeholder="Target pencapaian siswa hari ini..."></textarea>
                        </div>

                        <button id="btnSaveGlobal" class="btn btn-dark btn-lg w-100 fw-bold shadow mt-2">
                            <i class="bi bi-send-fill me-2"></i> SIARKAN DATA SEKARANG
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { listenToGlobalInfo, updateGlobalInfo } from './script.js';

        // 1. Cek Proteksi Keamanan Berlapis (HANYA SUP YANG BOLEH MASUK)
        const userVal = sessionStorage.getItem("loggedInUser");
        const userText = sessionStorage.getItem("loggedInName");

        if (userVal !== "sup") {
            // Kalau yang login bukan Sup (misal mentor iseng ngetik url superuser.html), tendang ke depan!
            alert("PELANGGARAN AKSES! Anda bukan Superadmin.");
            window.location.href = "index.html";
        }

        // Tampilkan Nama Superadmin
        document.getElementById("userNameDisplay").innerText = "Komandan " + userText;

        // 2. Tarik Data Terakhir dari Database saat halaman dibuka
        listenToGlobalInfo((data) => {
            document.getElementById('inputJadwal').value = data.jadwal || "";
            document.getElementById('inputBriefing').value = data.briefing || "";
            document.getElementById('inputCatatan').value = data.catatan || "";
            document.getElementById('inputGoal').value = data.goal || "";
        });

        // 3. Tombol Eksekusi: Simpan & Siarkan
        document.getElementById("btnSaveGlobal").onclick = async () => {
            const jadwalVal = document.getElementById('inputJadwal').value;
            const briefingVal = document.getElementById('inputBriefing').value;
            const catatanVal = document.getElementById('inputCatatan').value;
            const goalVal = document.getElementById('inputGoal').value;

            try {
                // Ubah tulisan tombol pas loading
                const btn = document.getElementById("btnSaveGlobal");
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> MENYIARKAN DATA...';
                
                // Kirim ke database lewat script.js
                await updateGlobalInfo({
                    jadwal: jadwalVal,
                    briefing: briefingVal,
                    catatan: catatanVal,
                    goal: goalVal
                });
                
                alert("Sukses! Semua instruksi telah disiarkan ke layar Mentor dan Halaman Depan.");
                btn.innerHTML = '<i class="bi bi-send-fill me-2"></i> SIARKAN DATA SEKARANG';
                
            } catch (error) {
                alert("Gagal menyiarkan! Cek koneksi atau aturan Firestore Anda.");
                document.getElementById("btnSaveGlobal").innerHTML = '<i class="bi bi-send-fill me-2"></i> SIARKAN DATA SEKARANG';
            }
        };

        // 4. Tombol Log Out / Keluar
        document.getElementById("btnLogout").onclick = () => {
            sessionStorage.clear();
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
