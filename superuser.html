<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Pengendali Admin - Jatirogo Creative Hub</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #1e293b;">

    <div class="app-wrapper">
        <nav class="navbar navbar-expand navbar-dark bg-dark shadow-sm mb-4 border-bottom border-secondary">
            <div class="container-fluid px-3">
                <a class="navbar-brand fw-bold text-white" href="#">
                    <i class="bi bi-shield-fill-check text-warning me-2"></i> PANEL KONTROL MANAJEMEN
                </a>
                <div class="d-flex align-items-center">
                    <span id="userNameDisplay" class="fw-bold me-3 text-light" style="font-size: 0.9rem;">Otoritas...</span>
                    <button id="btnLogout" class="btn btn-outline-danger btn-sm fw-bold">
                        <i class="bi bi-power"></i> Keluar
                    </button>
                </div>
            </div>
        </nav>

        <div class="container pb-5">
            <div class="row">
                
                <div class="col-12 col-lg-5 mb-4">
                    <div class="card card-custom p-4 shadow-lg bg-white h-100">
                        <h5 class="fw-bold text-dark mb-3"><i class="bi bi-broadcast text-danger me-2"></i> Konsol Siaran Real-Time</h5>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold text-primary small">1. PAPAN JADWAL FULL (Login Depan & Mentor)</label>
                            <textarea id="inputJadwal" class="form-control bg-light text-xs" rows="4" placeholder="Ketik master schedule lengkap..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-info small">2. NOTIF BRIEFING MENTOR</label>
                            <textarea id="inputBriefing" class="form-control bg-light text-xs" rows="2" placeholder="Instruksi briefing harian..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-warning small">3. CATATAN PENTING & EVALUASI</label>
                            <textarea id="inputCatatan" class="form-control bg-light text-xs" rows="2" placeholder="Catatan evaluasi khusus..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-success small">4. TARGET / GOAL KELAS HARIAN</label>
                            <textarea id="inputGoal" class="form-control bg-light text-xs" rows="2" placeholder="Target wajib hari ini..."></textarea>
                        </div>
                        <button id="btnSaveGlobal" class="btn btn-primary w-100 fw-bold shadow-sm py-2">
                            <i class="bi bi-cloud-upload-fill me-2"></i> PERBARUI PAPAN UTAMA
                        </button>
                    </div>
                </div>

                <div class="col-12 col-lg-7">
                    <div class="card card-custom p-4 shadow-lg bg-white h-100">
                        <h5 class="fw-bold text-primary mb-1"><i class="bi bi-server me-2"></i> Moderasi Data Aktivitas Mentor</h5>
                        <p class="text-muted small border-bottom pb-2">Sebagai administrator manajemen, Anda berhak penuh mengedit parameter sesi atau menghapus entri logbook yang salah input.</p>
                        
                        <div id="adminLogbookList" class="overflow-auto pe-1" style="max-height: 520px;">
                            <p class="text-center text-muted small mt-5">Sinkronisasi data aktivitas...</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { listenToGlobalInfo, updateGlobalInfo, listenToLogbooks, updateLogbook, deleteLogbook } from './script.js';

        // 1. Validasi Keamanan Berlapis
        const userVal = sessionStorage.getItem("loggedInUser");
        const userText = sessionStorage.getItem("loggedInName");

        if (userVal !== "sup" && userVal !== "afif") {
            alert("Akses Ilegal Terdeteksi!");
            window.location.href = "index.html";
        }
        document.getElementById("userNameDisplay").innerText = "Otoritas: " + userText;

        // 2. Load Info Papan Siaran
        listenToGlobalInfo((data) => {
            if (data) {
                document.getElementById('inputJadwal').value = data.jadwal || "";
                document.getElementById('inputBriefing').value = data.briefing || "";
                document.getElementById('inputCatatan').value = data.catatan || "";
                document.getElementById('inputGoal').value = data.goal || "";
            }
        });

        // Simpan Pembaruan Papan Siaran
        document.getElementById("btnSaveGlobal").onclick = async () => {
            try {
                await updateGlobalInfo({
                    jadwal: document.getElementById('inputJadwal').value,
                    briefing: document.getElementById('inputBriefing').value,
                    catatan: document.getElementById('inputCatatan').value,
                    goal: document.getElementById('inputGoal').value
                });
                alert("Sukses: Papan informasi global telah diperbarui!");
            } catch (e) { alert("Gagal memperbarui data papan siaran."); }
        };

        // 3. Tarik Real-Time List untuk Kebutuhan Edit & Hapus Komando
        listenToLogbooks((logData) => {
            const container = document.getElementById("adminLogbookList");
            container.innerHTML = "";
            
            if (logData.length === 0) {
                container.innerHTML = `<p class="text-center text-muted small mt-5">Belum ada rekaman logbook aktivitas mengajar.</p>`;
                return;
            }

            logData.forEach(d => {
                const waktu = d.waktu ? d.waktu.toDate().toLocaleString('id-ID', {dateStyle: 'short', timeStyle: 'short'}) : 'Baru saja';
                
                const box = document.createElement('div');
                box.className = "p-3 bg-light rounded-3 border mb-3 position-relative shadow-sm";
                box.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center border-bottom pb-1 mb-2">
                        <span class="fw-bold text-dark small"><i class="bi bi-person-fill"></i> ${d.nama.toUpperCase()}</span>
                        <span class="text-muted font-monospace" style="font-size: 0.7rem;">${waktu}</span>
                    </div>
                    <div class="mb-1"><span class="badge bg-primary text-xs me-1">${d.kelas}</span><span class="badge bg-dark text-xs">${d.jamKe}</span></div>
                    <div class="text-xs text-success fw-bold mb-1">✔ Materi: ${d.materi.join(', ')}</div>
                    <div class="text-xs text-muted mb-1 bg-white p-1.5 rounded border">📝 <b>Lap:</b> ${d.laporanSiswa}</div>
                    ${d.catatanKendala ? `<div class="text-xs text-danger mb-2 bg-danger bg-opacity-10 p-1.5 rounded border border-danger border-opacity-10">⚠️ <b>Kendala:</b> ${d.catatanKendala}</div>` : ''}
                `;

                // Layouting Tombol Operasi Admin di bagian bawah item
                const btnContainer = document.createElement('div');
                btnContainer.className = "d-flex gap-1 justify-content-end mt-2";

                // TOMBOL EDIT ADMIN
                const btnEdit = document.createElement('button');
                btnEdit.className = "btn btn-xs btn-outline-primary fw-bold text-xs px-2 py-0.5";
                btnEdit.innerHTML = `<i class="bi bi-pencil"></i> Edit Sesi`;
                btnEdit.onclick = () => aksidminEdit(d);

                // TOMBOL HAPUS ADMIN
                const btnHapus = document.createElement('button');
                btnHapus.className = "btn btn-xs btn-danger fw-bold text-xs px-2 py-0.5 text-white";
                btnHapus.innerHTML = `<i class="bi bi-trash"></i> Hapus`;
                btnHapus.onclick = () => aksidminHapus(d.id, d.nama, d.kelas, d.jamKe);

                btnContainer.appendChild(btnEdit);
                btnContainer.appendChild(btnHapus);
                box.appendChild(btnContainer);
                container.appendChild(box);
            });
        });

        // EKSEKUSI AUKSI EDIT DARI SUPERADMIN
        window.aksidminEdit = async function(data) {
            const kelasBaru = prompt(`Ubah Nama Kelas untuk ${data.nama}:`, data.kelas);
            if (kelasBaru === null) return; 

            const jamBaru = prompt(`Ubah Jam Sesi (Contoh: Jam 1 / Jam 2 / Jam 3 / Jam 4):`, data.jamKe);
            if (jamBaru === null) return;

            const laporanBaru = prompt(`Ubah Catatan Laporan Siswa:`, data.laporanSiswa);
            if (laporanBaru === null) return;

            const kendalaBaru = prompt(`Ubah Catatan Kendala:`, data.catatanKendala || "");
            if (kendalaBaru === null) return;

            try {
                await updateLogbook(data.id, {
                    kelas: kelasBaru,
                    jamKe: jamBaru,
                    laporanSiswa: laporanBaru,
                    catatanKendala: kendalaBaru
                });
                alert("Sukses: Data logbook mentor berhasil diperbarui oleh Administrator!");
            } catch (e) { alert("Gagal melakukan pembaruan dokumen."); }
        };

        // EKSEKUSI AKSI HAPUS DARI SUPERADMIN
        window.aksidminHapus = async function(id, nama, kelas, jam) {
            const konfirmasi = confirm(`PERINGATAN KRUSIAL:\nApakah Anda yakin ingin menghapus data logbook ${nama} pada ${kelas} (${jam}) secara permanen dari server database?`);
            if (konfirmasi) {
                try {
                    await deleteLogbook(id);
                    alert("Sukses: Dokumen logbook tersebut telah dihapus secara permanen.");
                } catch (e) { alert("Gagal menghapus dokumen database."); }
            }
        };

        // Mekanisme Keluar Sesi
        document.getElementById("btnLogout").onclick = () => {
            sessionStorage.clear();
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
