<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Pengendali - Super Creative Hub AEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body style="background-color: #1e293b;">
    <div class="app-wrapper">
        
        <!-- HEADER PROFESIONAL BARU -->
        <nav class="navbar navbar-expand bg-dark navbar-dark shadow-sm mb-4 border-bottom border-warning border-3">
            <div class="container-fluid px-3">
                <a class="navbar-brand fw-bold text-white d-flex align-items-center" href="#">
                    <i class="bi bi-shield-fill-check text-warning me-2" style="font-size: 1.5rem;"></i>
                    <div>
                        <div style="font-size: 1rem; line-height: 1;">KONTROL V6</div>
                        <div id="headHariKe" class="badge bg-danger mt-1" style="font-size: 0.65rem;">Timeline: Memuat...</div>
                    </div>
                </a>
                <div class="d-flex align-items-center">
                    <!-- Jam & Tanggal -->
                    <div class="text-end me-3 text-light border-end border-secondary pe-3 d-none d-sm-block">
                        <div id="headDate" class="fw-bold text-warning" style="font-size: 0.7rem;">Tanggal</div>
                        <div id="headClock" class="font-monospace fw-bold" style="font-size: 0.9rem;">00:00:00</div>
                    </div>
                    <!-- Profil Admin -->
                    <div class="text-end me-3 d-none d-sm-block">
                        <div class="text-light small fw-bold" id="userNameDisplay">Otoritas...</div>
                    </div>
                    <button id="btnLogout" class="btn btn-outline-danger btn-sm fw-bold"><i class="bi bi-power"></i></button>
                </div>
            </div>
        </nav>

        <div class="container pb-5">
            <div class="row">
                <!-- Kolom Kiri: KONSOL & TUGAS WA -->
                <div class="col-12 col-lg-5 mb-4">
                    <ul class="nav nav-tabs mb-3" id="adminTabs" role="tablist">
                        <li class="nav-item"><button class="nav-link active fw-bold" data-bs-toggle="tab" data-bs-target="#tab-konsol" type="button">Konsol Sistem</button></li>
                        <li class="nav-item"><button class="nav-link fw-bold text-success" data-bs-toggle="tab" data-bs-target="#tab-tugas" type="button"><i class="bi bi-whatsapp me-1"></i> Template Tugas WA</button></li>
                    </ul>

                    <div class="tab-content">
                        <!-- Sub-Tab: Konsol Master -->
                        <div class="tab-pane fade show active" id="tab-konsol">
                            <div class="card card-custom p-3 shadow-lg bg-white h-100">
                                <h6 class="fw-bold text-dark mb-3"><i class="bi bi-broadcast text-danger me-2"></i> Master Info</h6>
                                
                                <!-- INPUT TIMELINE HARI KE-X -->
                                <div class="mb-3 p-2 border border-warning rounded bg-warning bg-opacity-10">
                                    <label class="form-label fw-bold text-danger text-xs mb-1">0. TIMELINE HARI KURSUS</label>
                                    <input type="text" id="inputHariKe" class="form-control form-control-sm fw-bold text-primary border-warning" placeholder="Contoh: Hari ke-1 (Orientasi)">
                                </div>

                                <div class="mb-2"><label class="form-label fw-bold text-primary text-xs mb-1">1. JADWAL FULL</label><textarea id="inputJadwal" class="form-control bg-light text-xs" rows="2"></textarea></div>
                                <div class="mb-2"><label class="form-label fw-bold text-info text-xs mb-1">2. NOTIF BRIEFING</label><textarea id="inputBriefing" class="form-control bg-light text-xs" rows="2"></textarea></div>
                                <div class="mb-2"><label class="form-label fw-bold text-success text-xs mb-1">3. GOAL HARIAN</label><textarea id="inputGoal" class="form-control bg-light text-xs" rows="2"></textarea></div>
                                <div class="mb-2"><label class="form-label fw-bold text-secondary text-xs mb-1">4. MASTER MATERI (Pisahkan Enter)</label><textarea id="inputMasterMateri" class="form-control bg-light text-xs" rows="2"></textarea></div>
                                <div class="mb-3"><label class="form-label fw-bold text-danger text-xs mb-0">5. DATA SISWA (Cth: Kelas A: Budi)</label><textarea id="inputMasterSiswa" class="form-control bg-light text-xs border-danger border-opacity-25" rows="3"></textarea></div>
                                <button id="btnSaveGlobal" class="btn btn-primary w-100 fw-bold shadow-sm py-2"><i class="bi bi-cloud-upload-fill me-2"></i> PERBARUI SISTEM</button>
                            </div>
                        </div>

                        <!-- Sub-Tab: Template Tugas WA Sore -->
                        <div class="tab-pane fade" id="tab-tugas">
                            <div class="card card-custom p-3 shadow-lg bg-white h-100 border-success border-2">
                                <h6 class="fw-bold text-success mb-3"><i class="bi bi-send-fill me-2"></i> Input Tugas via WA (Jam 16:00)</h6>
                                <div class="mb-2">
                                    <label class="form-label fw-bold text-xs mb-1">Target Kiriman</label>
                                    <select id="waTarget" class="form-select form-select-sm border-success">
                                        <option value="GLOBAL (Semua Ruang A-D)">GLOBAL (Semua Ruang A-D)</option>
                                        <option value="Kelas A">Khusus Kelas A</option><option value="Kelas B">Khusus Kelas B</option><option value="Kelas C">Khusus Kelas C</option><option value="Kelas D">Khusus Kelas D</option>
                                    </select>
                                </div>
                                <div class="mb-2"><label class="form-label fw-bold text-xs mb-1">Link URL Gambar (Opsional)</label><input type="text" id="waGambar" class="form-control form-control-sm bg-light" placeholder="https://contoh.com/gambar.jpg"></div>
                                <div class="mb-3"><label class="form-label fw-bold text-xs mb-1">Instruksi Tugas Siswa</label><textarea id="waInstruksi" class="form-control bg-light text-sm" rows="4" placeholder="Ketik pesan instruksi..."></textarea></div>
                                <button id="btnKirimTugasWA" class="btn btn-success w-100 fw-bold shadow-sm py-2"><i class="bi bi-plus-circle me-2"></i> Buat Template WA</button>
                                <hr class="my-3"><h6 class="fw-bold text-dark text-xs mb-2">Riwayat Template Aktif:</h6>
                                <div id="listTugasAdmin" style="max-height: 250px; overflow-y: auto;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Kolom Kanan MODERASI & HISTORY -->
                <div class="col-12 col-lg-7">
                    <div class="card card-custom p-4 shadow-lg bg-white h-100">
                        <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                            <div><h5 class="fw-bold text-primary mb-1"><i class="bi bi-server me-2"></i> Moderasi & History</h5></div>
                            <button id="btnExportPDF" class="btn btn-danger fw-bold shadow-sm"><i class="bi bi-file-earmark-pdf-fill me-1"></i> PDF</button>
                        </div>
                        <select id="filterHari" class="form-select form-select-sm border-2 fw-bold text-danger mb-3"><option value="SEMUA">Memuat Hari...</option></select>
                        <div id="adminLogbookList" class="overflow-auto pe-1" style="max-height: 520px;">Memuat...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { startClock, listenToGlobalInfo, updateGlobalInfo, listenToLogbooks, deleteLogbook, sendTugasWA, listenToTugasWA, deleteTugasWA } from './script.js';
        if (sessionStorage.getItem("loggedInUser") !== "sup" && sessionStorage.getItem("loggedInUser") !== "afif") window.location.href = "index.html";
        document.getElementById("userNameDisplay").innerText = "Otoritas: " + sessionStorage.getItem("loggedInName");
        
        // Aktifkan Jam di Header
        startClock('headClock', 'headDate');

        listenToGlobalInfo((data) => {
            if (data) {
                // Tampilkan Timeline Hari ke-X di Input dan Badge Navbar
                document.getElementById('inputHariKe').value = data.hariKe || "";
                document.getElementById('headHariKe').innerText = "Timeline: " + (data.hariKe || "Belum diatur");
                
                document.getElementById('inputJadwal').value = data.jadwal || ""; document.getElementById('inputBriefing').value = data.briefing || "";
                document.getElementById('inputGoal').value = data.goal || ""; document.getElementById('inputMasterMateri').value = data.masterMateri ? data.masterMateri.join('\n') : "";
                document.getElementById('inputMasterSiswa').value = data.masterSiswa || "";
            }
        });

        document.getElementById("btnSaveGlobal").onclick = async () => {
            const materiArray = document.getElementById('inputMasterMateri').value.split('\n').map(i => i.trim()).filter(i => i !== "");
            try {
                await updateGlobalInfo({ 
                    hariKe: document.getElementById('inputHariKe').value, // Simpan Timeline Hari
                    jadwal: document.getElementById('inputJadwal').value, briefing: document.getElementById('inputBriefing').value, 
                    goal: document.getElementById('inputGoal').value, masterMateri: materiArray, masterSiswa: document.getElementById('inputMasterSiswa').value 
                });
                alert("Sukses diperbarui!");
            } catch (e) { alert("Gagal update."); }
        };

        // Modul TUGAS WA ADMIN
        document.getElementById("btnKirimTugasWA").onclick = async () => {
            const target = document.getElementById("waTarget").value; const gbr = document.getElementById("waGambar").value; const ins = document.getElementById("waInstruksi").value;
            if(!ins) return alert("Instruksi wajib diisi!");
            await sendTugasWA(target, gbr, ins);
            alert("Template Tugas WA Berhasil Dibuat!"); document.getElementById("waInstruksi").value = ""; document.getElementById("waGambar").value = "";
        };

        listenToTugasWA((data) => {
            const list = document.getElementById("listTugasAdmin"); list.innerHTML = "";
            data.forEach(d => {
                const w = d.waktu ? d.waktu.toDate().toLocaleString('id-ID', {dateStyle:'short', timeStyle:'short'}) : '-';
                list.innerHTML += `<div class="p-2 border rounded bg-light mb-2"><div class="d-flex justify-content-between"><span class="badge bg-success mb-1">${d.targetKelas}</span><span class="text-xs text-muted">${w}</span></div><p class="text-xs mb-1 text-truncate">${d.instruksi}</p><button class="btn btn-xs btn-outline-danger w-100" onclick="aksidminHapusTugas('${d.id}')">Hapus Template</button></div>`;
            });
        });

        window.aksidminHapusTugas = async function(id) { if (confirm(`Hapus template tugas ini?`)) await deleteTugasWA(id); };

        let dataLengkap = [];
        listenToLogbooks((logData) => { dataLengkap = logData; ekstrakHari(); renderListAdmin(); });
        document.getElementById('filterHari').onchange = () => renderListAdmin();

        function ekstrakHari() {
            const daysMap = new Map(); dataLengkap.forEach(d => { if(d.waktu) { const dStr = d.waktu.toDate().toLocaleDateString('id-ID'); if(!daysMap.has(dStr)) daysMap.set(dStr, d.waktu.toDate()); } });
            const sortedDays = Array.from(daysMap.entries()).sort((a,b) => a[1] - b[1]); const selHari = document.getElementById("filterHari"); const valSkg = selHari.value;
            selHari.innerHTML = '<option value="SEMUA">Semua Data (Global)</option>';
            sortedDays.forEach((entry, idx) => { selHari.innerHTML += `<option value="${entry[0]}">Hari ke-${idx+1} (${entry[0]})</option>`; });
            if (Array.from(selHari.options).some(o=>o.value===valSkg) && valSkg !== "SEMUA") selHari.value = valSkg; else if (sortedDays.length > 0 && valSkg === "SEMUA" && selHari.options.length <= 2) selHari.value = sortedDays[sortedDays.length-1][0];
        }

        function renderListAdmin() {
            const container = document.getElementById("adminLogbookList"); container.innerHTML = ""; const fHari = document.getElementById("filterHari").value;
            let dataTampil = dataLengkap; if (fHari !== "SEMUA") dataTampil = dataTampil.filter(d => d.waktu && d.waktu.toDate().toLocaleDateString('id-ID') === fHari);
            if(dataTampil.length === 0) { container.innerHTML = `<div class="alert alert-secondary text-center small">Kosong.</div>`; return; }
            dataTampil.forEach(d => {
                const w = d.waktu ? d.waktu.toDate().toLocaleString('id-ID', {dateStyle:'short', timeStyle:'short'}) : '-';
                let txtNilai = d.dataSiswa && d.dataSiswa.length > 0 ? d.dataSiswa.map(s => `<b>${s.nama}</b>(${s.kehadiran}, ${s.nilai})`).join(' | ') : 'Belum ada data';
                container.innerHTML += `<div class="p-3 bg-light rounded-3 border mb-3 shadow-sm"><div class="d-flex justify-content-between border-bottom pb-1 mb-2"><span class="fw-bold small">${d.nama.toUpperCase()}</span><span class="text-muted text-xs">${w}</span></div><div class="mb-1"><span class="badge bg-primary text-xs me-1">${d.kelas}</span><span class="badge bg-dark text-xs">${d.jamKe}</span></div><div class="text-xs mb-1">✔ Materi: ${d.materi.join(', ')}</div><div class="text-xs mb-1 p-1 bg-white border">📝 Tugas yg diberikan Mentor: <b>${d.tugasSiswa || '-'}</b></div><div class="text-xs p-1 bg-warning bg-opacity-10 border border-warning mb-2">📊 <b>Rapor Siswa:</b> <br> ${txtNilai}</div><div class="text-end mt-2"><button class="btn btn-xs btn-danger py-0" onclick="aksidminHapus('${d.id}')">Hapus Sesi</button></div></div>`;
            });
        }
        window.aksidminHapus = async function(id) { if (confirm(`Hapus permanen sesi ini?`)) await deleteLogbook(id); };

        document.getElementById("btnExportPDF").onclick = () => {
            const fHari = document.getElementById("filterHari").value; let dataTampil = dataLengkap;
            if (fHari !== "SEMUA") dataTampil = dataTampil.filter(d => d.waktu && d.waktu.toDate().toLocaleDateString('id-ID') === fHari);
            const printDiv = document.createElement("div"); printDiv.style.fontFamily = "Arial, sans-serif";
            let htmlString = `<h3 style="text-align:center;">LAPORAN AEC - ${fHari}</h3><table style="width: 100%; border-collapse: collapse; font-size: 11px;" border="1"><tr style="background:#ddd;"><th>Wkt</th><th>Tutor</th><th>Kls</th><th>Materi & Tugas Estafet</th><th>Nilai</th></tr>`;
            dataTampil.forEach(d => {
                const w = d.waktu ? d.waktu.toDate().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) : '-';
                let ds = d.dataSiswa ? d.dataSiswa.map(s=>`<b>${s.nama}</b>:${s.kehadiran}(${s.nilai || '-'})`).join('<br>') : '-';
                htmlString += `<tr><td>${w}</td><td>${d.nama}</td><td>${d.kelas}<br>${d.jamKe}</td><td><b>Materi:</b> ${d.materi.join(', ')}<br><b>Tugas:</b> ${d.tugasSiswa}</td><td>${ds}</td></tr>`;
            });
            htmlString += `</table>`; printDiv.innerHTML = htmlString;
            html2pdf().set({ margin: 0.3, filename: `AEC_${fHari.replace(/\//g, "-")}.pdf`, jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }}).from(printDiv).save();
        };
        document.getElementById("btnLogout").onclick = () => { sessionStorage.clear(); window.location.href = "index.html"; };
    </script>
</body>
</html>
