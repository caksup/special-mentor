<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Pengendali - Super Creative Hub AEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body style="background-color: #1e293b;">
    <div class="app-wrapper">
        <nav class="navbar navbar-expand navbar-dark bg-dark shadow-sm mb-4 border-bottom border-secondary">
            <div class="container-fluid px-3">
                <a class="navbar-brand fw-bold text-white" href="#"><i class="bi bi-shield-fill-check text-warning me-2"></i> KONTROL SUPER CREATIVE HUB AEC</a>
                <div class="d-flex align-items-center">
                    <span id="userNameDisplay" class="fw-bold me-3 text-light" style="font-size: 0.9rem;">Otoritas...</span>
                    <button id="btnLogout" class="btn btn-outline-danger btn-sm fw-bold"><i class="bi bi-power"></i> Keluar</button>
                </div>
            </div>
        </nav>

        <div class="container pb-5">
            <div class="row">
                <div class="col-12 col-lg-5 mb-4">
                    <div class="card card-custom p-4 shadow-lg bg-white h-100">
                        <h5 class="fw-bold text-dark mb-3"><i class="bi bi-broadcast text-danger me-2"></i> Konsol Sistem AEC</h5>
                        <div class="mb-3"><label class="form-label fw-bold text-primary small">1. JADWAL FULL</label><textarea id="inputJadwal" class="form-control bg-light text-xs" rows="2"></textarea></div>
                        <div class="mb-3"><label class="form-label fw-bold text-info small">2. NOTIF BRIEFING</label><textarea id="inputBriefing" class="form-control bg-light text-xs" rows="2"></textarea></div>
                        <div class="mb-3"><label class="form-label fw-bold text-warning small">3. CATATAN PENTING</label><textarea id="inputCatatan" class="form-control bg-light text-xs" rows="2"></textarea></div>
                        <div class="mb-3"><label class="form-label fw-bold text-success small">4. GOAL HARIAN</label><textarea id="inputGoal" class="form-control bg-light text-xs" rows="2"></textarea></div>
                        <div class="mb-3"><label class="form-label fw-bold text-secondary small">5. MASTER MATERI (Pisahkan dgn Enter)</label><textarea id="inputMasterMateri" class="form-control bg-light text-xs" rows="3"></textarea></div>
                        
                        <!-- FUNGSI BARU: MASTER SISWA -->
                        <div class="mb-4">
                            <label class="form-label fw-bold text-danger small">6. MASTER DATA SISWA PER KELAS</label>
                            <p class="text-xs text-muted mt-0 mb-1">Format: <b>Nama Kelas: Nama Anak, Nama Anak</b> (Pisahkan baris tiap kelas)</p>
                            <textarea id="inputMasterSiswa" class="form-control bg-light text-xs border-danger border-opacity-25" rows="4" placeholder="Kelas A: Budi, Citra, Andi&#10;Kelas B: Doni, Eka&#10;Kelas C: Fani, Gilang"></textarea>
                        </div>

                        <button id="btnSaveGlobal" class="btn btn-primary w-100 fw-bold shadow-sm py-2"><i class="bi bi-cloud-upload-fill me-2"></i> PERBARUI SISTEM</button>
                    </div>
                </div>

                <div class="col-12 col-lg-7">
                    <div class="card card-custom p-4 shadow-lg bg-white h-100">
                        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
                            <div><h5 class="fw-bold text-primary mb-1"><i class="bi bi-server me-2"></i> Moderasi & Data Nilai</h5></div>
                            <button id="btnExportPDF" class="btn btn-danger fw-bold shadow-sm"><i class="bi bi-file-earmark-pdf-fill me-1"></i> Export PDF</button>
                        </div>
                        <div id="adminLogbookList" class="overflow-auto pe-1" style="max-height: 580px;">Memuat...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { listenToGlobalInfo, updateGlobalInfo, listenToLogbooks, deleteLogbook } from './script.js';
        if (sessionStorage.getItem("loggedInUser") !== "sup" && sessionStorage.getItem("loggedInUser") !== "afif") window.location.href = "index.html";
        document.getElementById("userNameDisplay").innerText = "Otoritas: " + sessionStorage.getItem("loggedInName");

        listenToGlobalInfo((data) => {
            if (data) {
                document.getElementById('inputJadwal').value = data.jadwal || ""; document.getElementById('inputBriefing').value = data.briefing || "";
                document.getElementById('inputCatatan').value = data.catatan || ""; document.getElementById('inputGoal').value = data.goal || "";
                document.getElementById('inputMasterMateri').value = data.masterMateri ? data.masterMateri.join('\n') : "";
                document.getElementById('inputMasterSiswa').value = data.masterSiswa || "";
            }
        });

        document.getElementById("btnSaveGlobal").onclick = async () => {
            const materiArray = document.getElementById('inputMasterMateri').value.split('\n').map(i => i.trim()).filter(i => i !== "");
            try {
                await updateGlobalInfo({
                    jadwal: document.getElementById('inputJadwal').value, briefing: document.getElementById('inputBriefing').value,
                    catatan: document.getElementById('inputCatatan').value, goal: document.getElementById('inputGoal').value,
                    masterMateri: materiArray, masterSiswa: document.getElementById('inputMasterSiswa').value
                });
                alert("Sukses diperbarui!");
            } catch (e) { alert("Gagal update."); }
        };

        let dataLaporan = [];
        listenToLogbooks((logData) => {
            dataLaporan = logData; const container = document.getElementById("adminLogbookList"); container.innerHTML = "";
            logData.forEach(d => {
                const w = d.waktu ? d.waktu.toDate().toLocaleString('id-ID', {dateStyle:'short', timeStyle:'short'}) : '-';
                let txtNilai = d.dataSiswa && d.dataSiswa.length > 0 ? d.dataSiswa.map(s => `${s.nama}(${s.kehadiran}, N:${s.nilai})`).join(' | ') : 'Belum ada data absensi';
                
                container.innerHTML += `
                    <div class="p-3 bg-light rounded-3 border mb-3 shadow-sm">
                        <div class="d-flex justify-content-between border-bottom pb-1 mb-2"><span class="fw-bold small">${d.nama.toUpperCase()}</span><span class="text-muted text-xs">${w}</span></div>
                        <div class="mb-1"><span class="badge bg-primary text-xs me-1">${d.kelas}</span><span class="badge bg-dark text-xs">${d.jamKe}</span></div>
                        <div class="text-xs mb-1">✔ Materi: ${d.materi.join(', ')}</div>
                        <div class="text-xs mb-1 p-1 bg-white border">📝 Lap: ${d.laporanSiswa}</div>
                        <div class="text-xs p-1 bg-warning bg-opacity-10 border border-warning">📊 <b>Nilai & Absen:</b> ${txtNilai}</div>
                        <div class="text-end mt-2"><button class="btn btn-xs btn-danger py-0" onclick="aksidminHapus('${d.id}')">Hapus</button></div>
                    </div>`;
            });
        });

        window.aksidminHapus = async function(id) { if (confirm(`Hapus permanen?`)) await deleteLogbook(id); };

        document.getElementById("btnExportPDF").onclick = () => {
            const printDiv = document.createElement("div"); printDiv.style.padding = "20px"; printDiv.style.fontFamily = "Arial, sans-serif";
            let htmlString = `<h2 style="text-align:center;">LAPORAN SUPER CREATIVE HUB AEC</h2><table style="width: 100%; border-collapse: collapse; font-size: 11px;" border="1">
            <tr style="background:#ddd;"><th>Waktu</th><th>Mentor</th><th>Kelas</th><th>Materi</th><th>Lap. Siswa</th><th>Data Siswa (Hadir/Nilai)</th></tr>`;
            dataLaporan.forEach(d => {
                const w = d.waktu ? d.waktu.toDate().toLocaleString('id-ID') : '-';
                let ds = d.dataSiswa ? d.dataSiswa.map(s=>`${s.nama}: ${s.kehadiran}(${s.nilai})`).join('<br>') : '-';
                htmlString += `<tr><td>${w}</td><td>${d.nama}</td><td>${d.kelas} ${d.jamKe}</td><td>${d.materi.join(', ')}</td><td>${d.laporanSiswa}</td><td>${ds}</td></tr>`;
            });
            htmlString += `</table>`; printDiv.innerHTML = htmlString;
            html2pdf().set({ margin: 0.3, filename: 'Laporan_AEC.pdf', jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }}).from(printDiv).save();
        };
        document.getElementById("btnLogout").onclick = () => { sessionStorage.clear(); window.location.href = "index.html"; };
    </script>
</body>
</html>
