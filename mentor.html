<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Mentor - Super Creative Hub AEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <nav class="navbar navbar-expand bg-white shadow-sm mb-4">
            <div class="container-fluid px-3">
                <a class="navbar-brand fw-bold text-primary" href="#"><i class="bi bi-layers-half me-1"></i> Area Mentor AEC</a>
                <div class="d-flex align-items-center">
                    <span id="userNameDisplay" class="fw-bold me-3 text-secondary" style="font-size: 0.9rem;">Memuat...</span>
                    <button id="btnLogout" class="btn btn-outline-danger btn-sm fw-bold"><i class="bi bi-power"></i> Keluar</button>
                </div>
            </div>
        </nav>

        <div class="container pb-5">
            <div class="row">
                <div class="col-12 col-md-3 mb-4">
                    <div class="card card-custom p-2">
                        <ul class="nav nav-pills flex-row flex-md-column nav-fill gap-1" id="menuTabs">
                            <li class="nav-item"><button class="nav-link active w-100" id="tab-beranda" data-bs-toggle="pill" data-bs-target="#beranda"><i class="bi bi-house-door me-1"></i> Info AEC</button></li>
                            <li class="nav-item"><button class="nav-link w-100" id="tab-logbook" data-bs-toggle="pill" data-bs-target="#logbook"><i class="bi bi-pencil-square me-1"></i> Logbook & Nilai</button></li>
                            <li class="nav-item"><button class="nav-link w-100" id="tab-rekap" data-bs-toggle="pill" data-bs-target="#rekap"><i class="bi bi-globe me-1"></i> Monitor Global</button></li>
                        </ul>
                    </div>
                </div>

                <div class="col-12 col-md-9">
                    <div class="tab-content">
                        
                        <!-- TAB 1: INFORMASI -->
                        <div class="tab-pane fade show active" id="beranda">
                            <div class="card card-custom p-4 text-center mb-4 shadow-sm">
                                <h1 id="txtClockDash" class="digital-clock-dash mb-0">00:00:00</h1>
                                <p id="txtDateDash" class="text-muted fw-bold text-uppercase mb-0">Tanggal</p>
                            </div>
                            <div class="card card-custom p-4 shadow-sm border-0 mb-4 bg-light">
                                <h5 class="fw-bold text-primary mb-3">Target Hari Ini</h5>
                                <div class="info-box"><div class="info-box-title">📢 Briefing</div><div id="displayBriefing">Arahan...</div></div>
                                <div class="info-box warning"><div class="info-box-title">⚠️ Catatan</div><div id="displayCatatan">Catatan...</div></div>
                                <div class="info-box success"><div class="info-box-title">🎯 Goal</div><div id="displayGoal">Target...</div></div>
                            </div>
                        </div>

                        <!-- TAB 2: LOGBOOK & NILAI -->
                        <div class="tab-pane fade" id="logbook">
                            <div class="card card-custom p-4 shadow-sm">
                                <h5 class="fw-bold mb-3 border-bottom pb-2">Formulir Logbook & Penilaian Kelas</h5>
                                <input type="hidden" id="editDocId" value="">

                                <div class="row mb-3">
                                    <div class="col-12 col-md-6 mb-3 mb-md-0">
                                        <label class="form-label fw-bold text-secondary small">NAMA KELAS</label>
                                        <select id="inputKelas" class="form-select border fw-bold text-primary">
                                            <option value="">-- Pilih Kelas --</option>
                                            <option value="Kelas A">Kelas A</option><option value="Kelas B">Kelas B</option><option value="Kelas C">Kelas C</option><option value="Kelas D">Kelas D</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label class="form-label fw-bold text-secondary small">JAM SESI</label>
                                        <div class="btn-group w-100" role="group">
                                            <input type="radio" class="btn-check" name="jamSesi" id="j1" value="Jam 1" checked><label class="btn btn-outline-primary fw-bold" for="j1">1</label>
                                            <input type="radio" class="btn-check" name="jamSesi" id="j2" value="Jam 2"><label class="btn btn-outline-primary fw-bold" for="j2">2</label>
                                            <input type="radio" class="btn-check" name="jamSesi" id="j3" value="Jam 3"><label class="btn btn-outline-primary fw-bold" for="j3">3</label>
                                            <input type="radio" class="btn-check" name="jamSesi" id="j4" value="Jam 4"><label class="btn btn-outline-primary fw-bold" for="j4">4</label>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold text-secondary small">MATERI SESI</label>
                                    <div class="bg-light p-3 rounded-3 border" id="containerChecklistMateri"></div>
                                </div>

                                <!-- FUNGSI BARU: TABEL ABSENSI & NILAI SISWA -->
                                <div class="mb-3" id="areaSiswa" style="display: none;">
                                    <label class="form-label fw-bold text-danger small">ABSENSI & PENILAIAN SISWA</label>
                                    <div class="table-responsive bg-light p-2 rounded border">
                                        <table class="table table-sm table-bordered mb-0 align-middle text-xs">
                                            <thead class="table-secondary text-center">
                                                <tr><th>Nama Siswa</th><th style="width: 120px;">Kehadiran</th><th style="width: 80px;">Nilai</th><th>Catatan Mentor</th></tr>
                                            </thead>
                                            <tbody id="tabelSiswaBody">
                                                <!-- Baris siswa digenerate otomatis disini -->
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold text-secondary small">LAPORAN UMUM KELAS</label>
                                    <textarea id="notesSiswa" class="form-control bg-light border" rows="2"></textarea>
                                </div>

                                <button id="btnSave" class="btn btn-success btn-lg w-100 fw-bold shadow-sm mt-2"><i class="bi bi-send-check me-2"></i> KIRIM LOGBOOK & NILAI</button>
                                <button id="btnBatalEdit" class="btn btn-secondary w-100 fw-bold mt-2 d-none">Batal Edit</button>
                            </div>
                        </div>

                        <!-- TAB 3: MONITOR GLOBAL -->
                        <div class="tab-pane fade" id="rekap">
                            <div class="card card-custom p-4 shadow-sm">
                                <h5 class="fw-bold text-primary mb-3">Monitor Global AEC</h5>
                                <select id="filterKelas" class="form-select form-select-sm bg-light border fw-bold text-secondary mb-3">
                                    <option value="SEMUA">Semua Kelas</option><option value="Kelas A">Kelas A</option><option value="Kelas B">Kelas B</option><option value="Kelas C">Kelas C</option><option value="Kelas D">Kelas D</option>
                                </select>
                                <div id="logbookList" class="overflow-auto pe-2" style="max-height: 500px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { startClock, listenToGlobalInfo, sendLogbook, listenToLogbooks, updateLogbook } from './script.js';

        const userVal = sessionStorage.getItem("loggedInUser");
        if (!userVal || userVal === "sup") window.location.href = "index.html";
        document.getElementById("userNameDisplay").innerText = "Tutor: " + sessionStorage.getItem("loggedInName");
        startClock('txtClockDash', 'txtDateDash');

        let rawMasterSiswa = "";

        // Terima Info Global dari Superadmin
        listenToGlobalInfo((data) => {
            document.getElementById('displayBriefing').innerText = data.briefing;
            document.getElementById('displayCatatan').innerText = data.catatan;
            document.getElementById('displayGoal').innerText = data.goal;
            rawMasterSiswa = data.masterSiswa || ""; // Simpan string siswa
            
            // Render Materi
            const containerMateri = document.getElementById("containerChecklistMateri"); containerMateri.innerHTML = "";
            (data.masterMateri || []).forEach((materi, i) => {
                containerMateri.innerHTML += `<div class="form-check mb-1"><input class="form-check-input check-materi" type="checkbox" value="${materi}" id="m_${i}"><label class="form-check-label text-sm fw-bold" for="m_${i}">${materi}</label></div>`;
            });
        });

        // Event saat Mentor merubah pilihan Dropdown Kelas
        document.getElementById('inputKelas').onchange = (e) => {
            const kls = e.target.value;
            const area = document.getElementById('areaSiswa');
            const tbody = document.getElementById('tabelSiswaBody');
            tbody.innerHTML = "";
            
            if(!kls) { area.style.display = 'none'; return; }
            area.style.display = 'block';

            // Logika Membaca Database Master Siswa dari Superadmin
            const lines = rawMasterSiswa.split('\n');
            let foundSiswa = [];
            lines.forEach(line => {
                if(line.includes(':') && line.startsWith(kls)) {
                    foundSiswa = line.split(':')[1].split(',').map(s => s.trim()).filter(s => s !== "");
                }
            });

            if(foundSiswa.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Belum ada data siswa didaftarkan admin untuk kelas ini.</td></tr>`;
            } else {
                foundSiswa.forEach((nama, i) => {
                    tbody.innerHTML += `
                        <tr class="baris-siswa" data-nama="${nama}">
                            <td class="fw-bold">${nama}</td>
                            <td><select class="form-select form-select-sm sel-hadir"><option value="Hadir">Hadir</option><option value="Izin">Izin</option><option value="Sakit">Sakit</option><option value="Alpa">Alpa</option></select></td>
                            <td><input type="text" class="form-control form-control-sm in-nilai" placeholder="Nilai"></td>
                            <td><input type="text" class="form-control form-control-sm in-catatan" placeholder="Catatan anak..."></td>
                        </tr>
                    `;
                });
            }
        };

        // Render Monitor Global
        let masterLogData = [];
        listenToLogbooks((logData) => { masterLogData = logData; renderLogbookList(); });
        document.getElementById('filterKelas').onchange = () => renderLogbookList();

        function renderLogbookList() {
            const list = document.getElementById("logbookList"); const filterVal = document.getElementById("filterKelas").value; list.innerHTML = "";
            const filteredData = masterLogData.filter(d => filterVal === "SEMUA" || d.kelas === filterVal);
            if (filteredData.length === 0) { list.innerHTML = `<div class="alert alert-secondary text-center border-0">Kosong.</div>`; return; }
            
            filteredData.forEach((d, i) => {
                const w = d.waktu ? d.waktu.toDate().toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' }) : 'Baru saja';
                
                // Rakit Tabel Histori Nilai
                let tabelHtml = "";
                if (d.dataSiswa && d.dataSiswa.length > 0) {
                    tabelHtml = `<table class="table table-bordered text-xs mt-2 mb-0"><tr class="bg-light"><th>Siswa</th><th>Status</th><th>Nilai</th><th>Catatan</th></tr>`;
                    d.dataSiswa.forEach(s => { tabelHtml += `<tr><td>${s.nama}</td><td>${s.kehadiran}</td><td>${s.nilai || '-'}</td><td>${s.catatan || '-'}</td></tr>`; });
                    tabelHtml += `</table>`;
                }

                list.innerHTML += `
                    <div class="p-3 bg-white border rounded-3 mb-3 shadow-sm">
                        <div class="d-flex justify-content-between border-bottom pb-1 mb-2"><span class="fw-bold text-primary"><i class="bi bi-person-fill"></i> Tutor: ${d.nama}</span><span class="text-muted text-xs">${w}</span></div>
                        <div><span class="badge bg-primary me-1">${d.kelas}</span><span class="badge bg-dark">${d.jamKe}</span></div>
                        <div class="text-xs fw-bold text-success mt-1">✔ ${d.materi.join(', ') || '-'}</div>
                        <div class="text-xs mt-1 p-2 bg-light border">📝 Umum: ${d.laporanSiswa || '-'}</div>
                        <button class="btn btn-sm btn-outline-secondary w-100 mt-2 text-xs fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#col_${i}">Lihat Rapor & Absen Sesi Ini ▼</button>
                        <div class="collapse" id="col_${i}">${tabelHtml}</div>
                        ${d.mentorId === userVal ? `<button class="btn btn-sm btn-warning mt-2 w-100 fw-bold" onclick='window.editPersonal(${JSON.stringify(d).replace(/'/g, "\\'")})'>Edit Sesi Saya</button>` : ''}
                    </div>`;
            });
        }

        // Mode Edit (Mengembalikan data tabel)
        window.editPersonal = function(data) {
            document.getElementById("editDocId").value = data.id;
            document.getElementById("inputKelas").value = data.kelas;
            document.getElementById("inputKelas").dispatchEvent(new Event('change')); // Trigger memunculkan tabel
            
            setTimeout(() => {
                document.querySelectorAll('input[name="jamSesi"]').forEach(r => r.checked = r.value === data.jamKe);
                document.querySelectorAll('.check-materi').forEach(cb => cb.checked = data.materi.includes(cb.value));
                document.getElementById("notesSiswa").value = data.laporanSiswa;
                
                // Kembalikan nilai ke tabel
                const baris = document.querySelectorAll('.baris-siswa');
                baris.forEach(b => {
                    const nm = b.dataset.nama;
                    const cari = (data.dataSiswa || []).find(s => s.nama === nm);
                    if(cari) {
                        b.querySelector('.sel-hadir').value = cari.kehadiran;
                        b.querySelector('.in-nilai').value = cari.nilai;
                        b.querySelector('.in-catatan').value = cari.catatan;
                    }
                });

                document.getElementById("btnSave").innerHTML = 'SIMPAN PERUBAHAN';
                document.getElementById("btnBatalEdit").classList.remove("d-none");
                new bootstrap.Tab(document.getElementById('tab-logbook')).show();
            }, 500);
        }

        document.getElementById("btnBatalEdit").onclick = () => {
            document.getElementById("editDocId").value = ""; document.getElementById("inputKelas").value = ""; 
            document.getElementById("inputKelas").dispatchEvent(new Event('change'));
            document.getElementById("btnSave").innerHTML = '<i class="bi bi-send-check me-2"></i> KIRIM LOGBOOK & NILAI';
            document.getElementById("btnBatalEdit").classList.add("d-none");
        };

        // Simpan Logbook beserta Data Tabel Siswa
        document.getElementById("btnSave").onclick = async () => {
            const kls = document.getElementById("inputKelas").value; 
            if(!kls) return alert("Pilih Kelas dulu!");

            const jam = document.querySelector('input[name="jamSesi"]:checked').value;
            const mat = Array.from(document.querySelectorAll('.check-materi:checked')).map(c => c.value);
            const not = document.getElementById("notesSiswa").value;
            const edId = document.getElementById("editDocId").value;

            // Kumpulkan Data Siswa dari Tabel
            let arraySiswa = [];
            document.querySelectorAll('.baris-siswa').forEach(b => {
                arraySiswa.push({
                    nama: b.dataset.nama,
                    kehadiran: b.querySelector('.sel-hadir').value,
                    nilai: b.querySelector('.in-nilai').value,
                    catatan: b.querySelector('.in-catatan').value
                });
            });

            try {
                document.getElementById("btnSave").disabled = true;
                if (edId) await updateLogbook(edId, { kelas: kls, jamKe: jam, materi: mat, laporanSiswa: not, dataSiswa: arraySiswa });
                else await sendLogbook(userVal, sessionStorage.getItem("loggedInName"), kls, jam, mat, not, "", arraySiswa);
                
                alert("Sukses Tersimpan!");
                document.getElementById("btnBatalEdit").click();
                document.getElementById("btnSave").disabled = false;
                new bootstrap.Tab(document.getElementById('tab-rekap')).show();
            } catch (error) { alert("Error database!"); document.getElementById("btnSave").disabled = false; }
        };

        document.getElementById("btnLogout").onclick = () => { sessionStorage.clear(); window.location.href = "index.html"; };
    </script>
</body>
</html>
