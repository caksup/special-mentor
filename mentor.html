<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mentor - AEC Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8fafc; }
        .card-tugas { border-radius: 16px; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <nav class="navbar bg-white shadow-sm mb-3">
        <div class="container-fluid px-3">
            <span class="fw-bold" id="namaMentor">Halo Mentor...</span>
            <button class="btn btn-sm btn-outline-danger" onclick="sessionStorage.clear(); location.replace('index.html');">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="alert alert-info border-0 rounded-pill text-center shadow-sm">
            Tugas Sekolah: <b id="namaSekolahTugas">Memuat...</b>
        </div>

        <div class="row g-3">
            <div class="col-12">
                <div class="card p-3 card-tugas">
                    <h6 class="fw-bold"><i class="bi bi-journal-check"></i> Logbook Harian</h6>
                    <div id="mentorLogbookList">Memuat logbook...</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { listenToLogbooks, listenToSingleSchool } from './script.js?v=15';

        const sid = sessionStorage.getItem("assignedSchool");
        const nama = sessionStorage.getItem("loggedInName");

        if(!sid) {
            alert("Error: Anda belum ditugaskan ke sekolah mana pun. Hubungi Admin!");
            location.replace("index.html");
        }

        document.getElementById("namaMentor").innerText = "Halo, " + (nama || "Mentor");

        // 1. Ambil Nama Sekolah
        listenToSingleSchool(sid, (data) => {
            if(data) document.getElementById("namaSekolahTugas").innerText = data.namaSekolah;
        });

        // 2. Ambil Logbook otomatis (tanpa perlu milih-milih)
        listenToLogbooks(sid, (logs) => {
            const list = document.getElementById("mentorLogbookList");
            list.innerHTML = logs.length > 0 ? logs.map(l => `
                <div class="border-bottom py-2">
                    <div class="fw-bold">${l.nama} - ${l.kelas}</div>
                    <small class="text-muted">${l.materi || '-'}</small>
                </div>
            `).join('') : '<p class="text-muted text-center mt-3">Belum ada logbook.</p>';
        });
    </script>
</body>
</html>
