<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin - Super Creative Hub AEC</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark">

    <nav class="navbar navbar-expand bg-dark shadow-sm border-bottom border-warning border-3 mb-5">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold d-flex align-items-center text-decoration-none" href="info.html" title="Info Sistem">
                <i class="bi bi-shield-lock-fill text-warning me-2" style="font-size: 1.5rem;"></i>
                <div>
                    <div style="font-size: 1rem; line-height: 1;" class="text-white">PORTAL VIP <span id="netStatus" class="ms-1"><i class="bi bi-circle-fill text-success" style="font-size: 0.6rem;"></i></span></div>
                    <div id="headHariKe" class="badge bg-danger mt-1" style="font-size: 0.65rem;">Timeline: Memuat...</div>
                </div>
            </a>
            <div class="d-flex align-items-center">
                <div class="text-end me-2 text-light d-none d-sm-block">
                    <div id="headDate" class="fw-bold text-warning" style="font-size: 0.7rem;">Tanggal</div>
                    <div id="headClock" class="font-monospace fw-bold" style="font-size: 0.9rem;">00:00:00</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="login-wrapper container">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-md-4">
                <div class="card p-4 h-100 shadow-lg border-warning border-1 bg-secondary text-white" style="border-radius: 16px;">
                    <div class="text-center mb-4 mt-2">
                        <i class="bi bi-fingerprint text-warning" style="font-size: 3rem;"></i><h4 class="fw-bold mt-2">Otorisasi VIP</h4><p class="small text-light opacity-75">Direktur & Superadmin Area</p>
                    </div>
                    <div class="mb-3"><input type="text" id="userInput" class="form-control form-control-lg bg-dark text-white border-0 text-center fw-bold text-lowercase" placeholder="username admin" autocomplete="off"></div>
                    <div class="mb-4"><input type="password" id="pinInput" class="form-control form-control-lg bg-dark text-white border-0 text-center tracking-widest fw-bold" placeholder="PIN RAHASIA" pattern="[0-9]*" inputmode="numeric"></div>
                    <button id="btnMasuk" class="btn btn-warning btn-lg w-100 fw-bold shadow-sm mt-auto text-dark">SINKRONISASI <i class="bi bi-unlock-fill ms-2"></i></button>
                    <div class="text-center mt-4"><a href="index.html" class="text-light opacity-50 small text-decoration-none"><i class="bi bi-arrow-left"></i> Kembali</a></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { mentorData, listenToGlobalInfo } from './script.js?v=8';

        function updateNetworkStatus() {
            const ind = document.getElementById('netStatus');
            if (navigator.onLine) ind.innerHTML = '<i class="bi bi-circle-fill text-success" style="font-size: 0.6rem;"></i>';
            else ind.innerHTML = '<i class="bi bi-circle-fill text-danger" style="font-size: 0.6rem;"></i>';
        }
        window.addEventListener('online', updateNetworkStatus); window.addEventListener('offline', updateNetworkStatus); updateNetworkStatus();

        setInterval(() => {
            const now = new Date(); document.getElementById('headClock').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('headDate').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }, 1000);
        listenToGlobalInfo((data) => { document.getElementById('headHariKe').innerText = "Timeline: " + (data.hariKe || "Belum diatur"); });

        document.getElementById('btnMasuk').onclick = () => {
            const userVal = document.getElementById('userInput').value.toLowerCase().trim(); const pin = document.getElementById('pinInput').value;
            if (!userVal) return alert("Ketik username!"); if (!mentorData[userVal]) return alert("Username tidak ditemukan!");
            if (userVal !== "afif" && userVal !== "sup") return alert("Akses Ilegal!"); if (pin !== mentorData[userVal].pin) return alert("PIN salah.");
            sessionStorage.setItem("loggedInUser", userVal); sessionStorage.setItem("loggedInName", mentorData[userVal].julukan); window.location.href = "superuser.html"; 
        };
    </script>
</body>
</html>
