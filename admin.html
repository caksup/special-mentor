<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin - Super Creative Hub AEC</title>
    
    <!-- Bootstrap 5 CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark">

    <div class="login-wrapper container">
        <div class="row w-100 justify-content-center">
            
            <div class="col-12 col-md-4">
                <div class="card p-4 h-100 shadow-lg border-0 bg-secondary text-white" style="border-radius: 16px;">
                    <div class="text-center mb-4 mt-2">
                        <i class="bi bi-shield-lock-fill text-warning" style="font-size: 3rem;"></i>
                        <h4 class="fw-bold mt-2">Jalur VIP Admin</h4>
                        <p class="small text-light opacity-75">Otorisasi Direktur & Superadmin</p>
                    </div>

                    <!-- KOTAK KETIK MANUAL (Menggantikan Dropdown) -->
                    <div class="mb-3">
                        <input type="text" id="userInput" class="form-control form-control-lg bg-dark text-white border-0 text-center fw-bold text-lowercase" placeholder="username admin" autocomplete="off">
                    </div>

                    <div class="mb-4">
                        <input type="password" id="pinInput" class="form-control form-control-lg bg-dark text-white border-0 text-center tracking-widest fw-bold" placeholder="PIN RAHASIA" pattern="[0-9]*" inputmode="numeric">
                    </div>

                    <button id="btnMasuk" class="btn btn-warning btn-lg w-100 fw-bold shadow-sm mt-auto text-dark">
                        OTORISASI MASUK <i class="bi bi-unlock-fill ms-2"></i>
                    </button>
                    
                    <div class="text-center mt-4">
                        <a href="index.html" class="text-light opacity-50 small text-decoration-none"><i class="bi bi-arrow-left"></i> Kembali ke Portal Mentor</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Panggil File Logika -->
    <script type="module">
        import { mentorData } from './script.js';

        document.getElementById('btnMasuk').onclick = () => {
            // Ambil input, paksa huruf kecil, dan hilangkan spasi
            const userVal = document.getElementById('userInput').value.toLowerCase().trim();
            const pin = document.getElementById('pinInput').value;

            // 1. Cek apakah kotak username kosong
            if (!userVal) {
                alert("Peringatan: Harap ketik username Anda!");
                return;
            }

            // 2. Cek apakah username terdaftar di database
            if (!mentorData[userVal]) {
                alert("Akses Ditolak: Username tidak ditemukan dalam sistem!");
                return;
            }

            // 3. Cek Hak Akses (Hanya Direktur dan Superadmin yang boleh masuk sini)
            if (userVal !== "afif" && userVal !== "sup") {
                alert("Akses Ilegal: Anda tidak memiliki hak akses tingkat manajemen!");
                return;
            }

            // 4. Cek apakah PIN benar
            if (pin !== mentorData[userVal].pin) {
                alert("Akses Ditolak! PIN Keamanan Anda salah.");
                return;
            }

            // Jika semua lolos, simpan sesi dan masuk ke ruang kendali
            sessionStorage.setItem("loggedInUser", userVal);
            sessionStorage.setItem("loggedInName", mentorData[userVal].julukan);
            window.location.href = "superuser.html"; 
        };
    </script>
</body>
</html>
