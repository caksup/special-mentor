<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Masuk - Super Creative Hub AEC</title>
    <!-- LINK PWA MANIFEST -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- HEADER V8 DENGAN LINK INFO & INDIKATOR SINYAL -->
    <nav class="navbar navbar-expand bg-white shadow-sm border-bottom border-primary border-3 mb-4">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold d-flex align-items-center text-decoration-none" href="info.html" title="Klik untuk Info & Versi Aplikasi">
                <i class="bi bi-layers-half me-2 text-primary" style="font-size: 1.5rem;"></i>
                <div>
                    <div style="font-size: 1rem; line-height: 1;" class="text-primary">PORTAL AEC <span id="netStatus" class="ms-1"><i class="bi bi-circle-fill text-success" style="font-size: 0.6rem;"></i></span></div>
                    <div id="headHariKe" class="badge bg-danger mt-1" style="font-size: 0.65rem;">Timeline: Memuat...</div>
                </div>
            </a>
            <div class="d-flex align-items-center">
                <div class="text-end me-2 text-secondary d-none d-sm-block">
                    <div id="headDate" class="fw-bold" style="font-size: 0.7rem;">Tanggal</div>
                    <div id="headClock" class="font-monospace fw-bold text-primary" style="font-size: 0.9rem;">00:00:00</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="login-wrapper container">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-md-5 mb-4 mb-md-0">
                <div class="card card-custom p-4 h-100 bg-primary text-white shadow-lg">
                    <div class="text-center mb-4">
                        <div id="txtClockLogin" class="digital-clock-login text-white mb-0">00:00:00</div>
                        <div id="txtDateLogin" class="small fw-bold text-uppercase opacity-75">Memuat Waktu...</div>
                    </div>
                    <hr class="border-white opacity-25">
                    <div class="mt-2">
                        <h6 class="fw-bold"><i class="bi bi-calendar-event me-2"></i> Master Schedule:</h6>
                        <div class="bg-white text-dark p-3 rounded-3 mt-3 shadow-sm" style="min-height: 100px;">
                            <p id="displayJadwal" class="mb-0 small fw-medium" style="white-space: pre-line;">Sinkronisasi...</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card card-custom p-4 h-100 shadow-sm border-0">
                    <div class="text-center mb-4 mt-2">
                        <h4 class="fw-bold text-dark">Portal Masuk</h4>
                        <p class="text-muted small">Ketik username & PIN Tutor</p>
                    </div>
                    <div class="mb-3"><input type="text" id="userInput" class="form-control form-control-lg bg-light border-0 text-center fw-bold text-lowercase" placeholder="username" autocomplete="off"></div>
                    <div class="mb-4"><input type="password" id="pinInput" class="form-control form-control-lg bg-light border-0 text-center tracking-widest fw-bold" placeholder="PIN" pattern="[0-9]*" inputmode="numeric"></div>
                    <button id="btnMasuk" class="btn btn-dark btn-lg w-100 fw-bold shadow-sm mt-auto">MASUK <i class="bi bi-arrow-right-circle ms-2"></i></button>
                    <div class="text-center mt-3"><a href="admin.html" class="text-muted small text-decoration-none opacity-25 hover-opacity-100"><i class="bi bi-shield-lock"></i> VIP</a></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { startClock, listenToGlobalInfo, mentorData } from './script.js?v=8';

        // Deteksi Sinyal
        function updateNetworkStatus() {
            const ind = document.getElementById('netStatus');
            if (navigator.onLine) ind.innerHTML = '<i class="bi bi-circle-fill text-success" style="font-size: 0.6rem;" title="Online"></i>';
            else ind.innerHTML = '<i class="bi bi-circle-fill text-danger" style="font-size: 0.6rem;" title="Offline Mode"></i>';
        }
        window.addEventListener('online', updateNetworkStatus); window.addEventListener('offline', updateNetworkStatus); updateNetworkStatus();

        startClock('txtClockLogin', 'txtDateLogin');
        setInterval(() => {
            const now = new Date(); document.getElementById('headClock').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('headDate').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }, 1000);

        listenToGlobalInfo((data) => {
            document.getElementById('displayJadwal').innerText = data.jadwal;
            document.getElementById('headHariKe').innerText = "Timeline: " + (data.hariKe || "Belum diatur");
        });

        document.getElementById('btnMasuk').onclick = () => {
            const userVal = document.getElementById('userInput').value.toLowerCase().trim(); const pin = document.getElementById('pinInput').value;
            if (!userVal) return alert("Ketik username!"); if (!mentorData[userVal]) return alert("Username tidak terdaftar!");
            if (mentorData[userVal].pin !== pin) return alert("PIN salah.");
            sessionStorage.setItem("loggedInUser", userVal); sessionStorage.setItem("loggedInName", mentorData[userVal].julukan);
            window.location.href = "mentor.html"; 
        };
    </script>
</body>
</html>
