<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Masuk - Jatirogo Creative Hub</title>
    
    <!-- Bootstrap 5 CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-wrapper container">
        <div class="row w-100 justify-content-center">
            
            <!-- Kolom Info & Jadwal Depan -->
            <div class="col-12 col-md-5 mb-4 mb-md-0">
                <div class="card card-custom p-4 h-100 bg-primary text-white shadow-lg">
                    <div class="text-center mb-4">
                        <div id="txtClockLogin" class="digital-clock-login text-white mb-0">00:00:00</div>
                        <div id="txtDateLogin" class="small fw-bold text-uppercase opacity-75">Memuat Waktu...</div>
                    </div>
                    <hr class="border-white opacity-25">
                    <div class="mt-2">
                        <h6 class="fw-bold"><i class="bi bi-calendar-event me-2"></i> Jadwal & Info Hari Ini:</h6>
                        <div class="bg-white text-dark p-3 rounded-3 mt-3 shadow-sm" style="min-height: 100px;">
                            <p id="displayJadwal" class="mb-0 small fw-medium" style="white-space: pre-line;">Sedang memuat sinkronisasi jadwal...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Kolom Login Form (HANYA MENTOR) -->
            <div class="col-12 col-md-4">
                <div class="card card-custom p-4 h-100 shadow-sm">
                    <div class="text-center mb-4 mt-2">
                        <h4 class="fw-bold text-dark">Portal Masuk</h4>
                        <p class="text-muted small">Pilih nama Anda & masukkan PIN</p>
                    </div>

                    <div class="mb-3">
                        <select id="userSelect" class="form-select form-select-lg bg-light border-0 fw-bold text-center">
                            <!-- HANYA MENTOR, ADMIN DIHAPUS DARI SINI -->
                            <option value="anam">Anam</option>
                            <option value="rizal">Rizal</option>
                            <option value="budi">Budi</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <input type="password" id="pinInput" class="form-control form-control-lg bg-light border-0 text-center tracking-widest fw-bold" placeholder="PIN" pattern="[0-9]*" inputmode="numeric">
                    </div>

                    <button id="btnMasuk" class="btn btn-dark btn-lg w-100 fw-bold shadow-sm mt-auto">
                        MASUK <i class="bi bi-arrow-right-circle ms-2"></i>
                    </button>
                    
                    <!-- TOMBOL RAHASIA MENUJU LOGIN ADMIN -->
                    <div class="text-center mt-3">
                        <a href="admin.html" class="text-muted small text-decoration-none opacity-25 hover-opacity-100"><i class="bi bi-shield-lock"></i></a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Panggil File Logika Kita -->
    <script type="module">
        import { startClock, listenToGlobalInfo, userPins } from './script.js';

        startClock('txtClockLogin', 'txtDateLogin');

        listenToGlobalInfo((data) => {
            document.getElementById('displayJadwal').innerText = data.jadwal;
        });

        document.getElementById('btnMasuk').onclick = () => {
            const userVal = document.getElementById('userSelect').value;
            const userText = document.getElementById('userSelect').options[document.getElementById('userSelect').selectedIndex].text;
            const pin = document.getElementById('pinInput').value;

            if (pin !== userPins[userVal]) {
                alert("Gagal masuk! PIN Anda salah.");
                return;
            }

            sessionStorage.setItem("loggedInUser", userVal);
            sessionStorage.setItem("loggedInName", userText);

            // Karena di sini cuma ada Mentor, langsung lempar ke mentor.html
            window.location.href = "mentor.html"; 
        };
    </script>
</body>
</html>
