<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Masuk - Super Creative Hub AEC</title>
    
    <!-- Bootstrap 5 CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- HEADER PROFESIONAL LOGIN -->
    <nav class="navbar navbar-expand bg-white shadow-sm border-bottom border-primary border-3 mb-4">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold text-primary d-flex align-items-center" href="#">
                <i class="bi bi-layers-half me-2" style="font-size: 1.5rem;"></i>
                <div>
                    <div style="font-size: 1rem; line-height: 1;">PORTAL TUTOR AEC</div>
                    <div id="headHariKe" class="badge bg-danger mt-1" style="font-size: 0.65rem;">Timeline: Memuat...</div>
                </div>
            </a>
            <div class="d-flex align-items-center">
                <!-- Jam & Tanggal Header -->
                <div class="text-end me-2 text-secondary d-none d-sm-block">
                    <div id="headDate" class="fw-bold" style="font-size: 0.7rem;">Tanggal</div>
                    <div id="headClock" class="font-monospace fw-bold text-primary" style="font-size: 0.9rem;">00:00:00</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="login-wrapper container">
        <div class="row w-100 justify-content-center">
            
            <!-- Kolom Info & Jadwal Depan -->
            <div class="col-12 col-md-5 mb-4 mb-md-0">
                <div class="card card-custom p-4 h-100 bg-primary text-white shadow-lg">
                    <div class="text-center mb-4">
                        <div id="txtClockLogin" class="digital-clock-login text-white mb-0">00:00:00</div>
                        <div id="txtDateLogin" class="small fw-bold text-uppercase opacity-75">Memuat Waktu...</div>
                    </div>
                    <hr class="border-white opacity-25">
                    <div class="mt-2">
                        <h6 class="fw-bold"><i class="bi bi-calendar-event me-2"></i> Master Schedule Hari Ini:</h6>
                        <div class="bg-white text-dark p-3 rounded-3 mt-3 shadow-sm" style="min-height: 100px;">
                            <p id="displayJadwal" class="mb-0 small fw-medium" style="white-space: pre-line;">Sinkronisasi jadwal...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- KOLOM LOGIN KETIK MANUAL -->
            <div class="col-12 col-md-4">
                <div class="card card-custom p-4 h-100 shadow-sm border-0">
                    <div class="text-center mb-4 mt-2">
                        <h4 class="fw-bold text-dark">Portal Masuk</h4>
                        <p class="text-muted small">Ketik username & PIN Tutor</p>
                    </div>

                    <div class="mb-3">
                        <input type="text" id="userInput" class="form-control form-control-lg bg-light border-0 text-center fw-bold text-lowercase" placeholder="username" autocomplete="off">
                    </div>

                    <div class="mb-4">
                        <input type="password" id="pinInput" class="form-control form-control-lg bg-light border-0 text-center tracking-widest fw-bold" placeholder="PIN" pattern="[0-9]*" inputmode="numeric">
                    </div>

                    <button id="btnMasuk" class="btn btn-dark btn-lg w-100 fw-bold shadow-sm mt-auto">
                        MASUK <i class="bi bi-arrow-right-circle ms-2"></i>
                    </button>
                    
                    <div class="text-center mt-3">
                        <a href="admin.html" class="text-muted small text-decoration-none opacity-25 hover-opacity-100"><i class="bi bi-shield-lock"></i> VIP</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Panggil File Logika Kita -->
    <script type="module">
        import { startClock, listenToGlobalInfo, mentorData } from './script.js';

        // Aktifkan Jam Tengah
        startClock('txtClockLogin', 'txtDateLogin');
        
        // Aktifkan Jam Header
        setInterval(() => {
            const now = new Date();
            document.getElementById('headClock').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('headDate').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }, 1000);

        listenToGlobalInfo((data) => {
            document.getElementById('displayJadwal').innerText = data.jadwal;
            // Tampilkan Timeline Hari Ke-
            document.getElementById('headHariKe').innerText = "Timeline: " + (data.hariKe || "Belum diatur");
        });

        document.getElementById('btnMasuk').onclick = () => {
            const userVal = document.getElementById('userInput').value.toLowerCase().trim();
            const pin = document.getElementById('pinInput').value;

            if (!userVal) return alert("Peringatan: Harap ketik username Anda!");
            if (!mentorData[userVal]) return alert("Akses Ditolak: Username tidak terdaftar dalam sistem!");
            if (mentorData[userVal].pin !== pin) return alert("Gagal masuk! PIN keamanan Anda salah.");

            sessionStorage.setItem("loggedInUser", userVal);
            sessionStorage.setItem("loggedInName", mentorData[userVal].julukan);
            window.location.href = "mentor.html"; 
        };
    </script>
</body>
</html>
