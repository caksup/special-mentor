<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Masuk - AEC Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- HEADER V10: TIMELINE BUNDERAN & SEKOLAH -->
    <nav class="navbar navbar-expand bg-white shadow-sm border-bottom border-primary border-3 mb-4">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold d-flex align-items-center text-decoration-none" href="info.html">
                <i class="bi bi-layers-half me-2 text-primary" style="font-size: 1.8rem;"></i>
                <div>
                    <div style="font-size: 1rem; line-height: 1.2;" class="text-primary">PORTAL AEC <span id="netStatus" class="ms-1"></span></div>
                    <div class="d-flex align-items-center mt-1">
                        <span class="badge bg-danger text-white me-2" style="font-size: 0.7rem;">Hari Ke: <span id="headTimeline">Memuat...</span></span>
                        <span id="headSekolah" class="text-xs fw-bold text-secondary text-uppercase">Memuat Lokasi...</span>
                    </div>
                </div>
            </a>
            <div class="d-flex align-items-center">
                <div class="text-end me-2 text-secondary d-none d-sm-block">
                    <div id="headDate" class="fw-bold" style="font-size: 0.7rem;">Tanggal</div>
                    <div id="headClock" class="font-monospace fw-bold text-primary" style="font-size: 0.9rem;">00:00:00</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="login-wrapper container">
        <div class="row w-100 justify-content-center">
            
            <!-- PANEL KIRI: JADWAL & INFO -->
            <div class="col-12 col-md-6 mb-4 mb-md-0">
                <div class="card card-custom p-4 h-100 bg-primary text-white shadow-lg">
                    <div class="text-center mb-3">
                        <div id="txtClockLogin" class="digital-clock-login text-white mb-0">00:00:00</div>
                        <div id="txtDateLogin" class="small fw-bold text-uppercase opacity-75">Memuat Waktu...</div>
                    </div>
                    <hr class="border-white opacity-25 mb-3">
                    <div class="text-start">
                        <div class="mb-3 p-2 bg-white bg-opacity-10 rounded border border-white border-opacity-25">
                            <h6 class="fw-bold text-warning text-xs mb-1"><i class="bi bi-calendar-week"></i> JADWAL FULL GLOBAL</h6>
                            <p id="displayJadwal" class="small fw-medium mb-0 text-light" style="white-space: pre-line;">Memuat...</p>
                        </div>
                        <div class="mb-3 p-2 bg-white bg-opacity-10 rounded border border-white border-opacity-25">
                            <h6 class="fw-bold text-info text-xs mb-1"><i class="bi bi-calendar-event"></i> JADWAL HARIAN KELAS</h6>
                            <p id="displayJadwalHarian" class="small fw-medium mb-0 text-light" style="white-space: pre-line;">Memuat...</p>
                        </div>
                        <div class="p-2 bg-danger bg-opacity-25 rounded border border-danger border-opacity-50">
                            <h6 class="fw-bold text-white text-xs mb-1"><i class="bi bi-megaphone"></i> NOTIF & BRIEFING</h6>
                            <p id="displayBriefing" class="small fw-medium mb-0 text-light" style="white-space: pre-line;">Memuat...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PANEL KANAN: LOGIN UNIVERSAL -->
            <div class="col-12 col-md-4">
                <div class="card card-custom p-4 h-100 shadow-sm border-0">
                    <div class="text-center mb-4 mt-2">
                        <h4 class="fw-bold text-dark">Portal Masuk</h4>
                        <p class="text-muted small">Ketik Username & PIN Anda</p>
                    </div>
                    
                    <div class="mb-3">
                        <input type="text" id="userInput" class="form-control form-control-lg bg-light border-0 text-center fw-bold text-lowercase" placeholder="username" autocomplete="off">
                    </div>
                    <div class="mb-4">
                        <input type="password" id="pinInput" class="form-control form-control-lg bg-light border-0 text-center tracking-widest fw-bold" placeholder="PIN" pattern="[0-9]*" inputmode="numeric">
                    </div>

                    <button id="btnMasuk" class="btn btn-dark btn-lg w-100 fw-bold shadow-sm mt-auto position-relative">
                        <span id="btnText">MASUK <i class="bi bi-box-arrow-in-right ms-2"></i></span>
                        <div id="btnLoading" class="spinner-border spinner-border-sm text-light position-absolute top-50 start-50 translate-middle d-none" role="status"></div>
                    </button>
                    
                    <div class="text-center mt-4">
                        <p class="text-xs text-muted mb-0"><i class="bi bi-shield-check text-success"></i> Secured by AEC Engine V10</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { startClock, listenToGlobalInfo, verifyLogin, generateTimelineHTML } from './script.js?v=10';
        
        // AUTO REDIRECT SESUAI ROLE
        const activeUser = sessionStorage.getItem("loggedInUser");
        const activeRole = sessionStorage.getItem("userRole");
        if (activeUser && activeRole) {
            if (activeRole === "admin") window.location.replace("superuser.html");
            else if (activeRole === "direktur") window.location.replace("direktur.html");
            else window.location.replace("mentor.html");
        }

        function updateNetworkStatus() {
            document.getElementById('netStatus').innerHTML = navigator.onLine 
                ? '<i class="bi bi-circle-fill text-success" style="font-size: 0.6rem;"></i>' 
                : '<i class="bi bi-circle-fill text-danger" style="font-size: 0.6rem;"></i>';
        }
        window.addEventListener('online', updateNetworkStatus); window.addEventListener('offline', updateNetworkStatus); updateNetworkStatus();
        startClock('txtClockLogin', 'txtDateLogin');
        
        setInterval(() => {
            const now = new Date(); document.getElementById('headClock').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('headDate').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }, 1000);

        listenToGlobalInfo((data) => {
            document.getElementById('displayJadwal').innerText = data.jadwal || "-";
            document.getElementById('displayJadwalHarian').innerText = data.jadwalHarian || "-";
            document.getElementById('displayBriefing').innerText = data.briefing || "-";
            
            // RENDER TIMELINE ❶❷③ DAN NAMA SEKOLAH
            document.getElementById('headSekolah').innerText = data.namaSekolah || "AEC Hub Pusat";
            document.getElementById('headTimeline').innerText = generateTimelineHTML(data.totalHari, data.hariBerjalan);
        });

        document.getElementById('btnMasuk').onclick = async () => {
            const userVal = document.getElementById('userInput').value.toLowerCase().trim(); 
            const pin = document.getElementById('pinInput').value;
            if (!userVal || !pin) return alert("Peringatan: Username dan PIN wajib diisi!");
            
            const btn = document.getElementById('btnMasuk'); const txt = document.getElementById('btnText'); const load = document.getElementById('btnLoading');
            btn.disabled = true; txt.classList.add('d-none'); load.classList.remove('d-none');

            try {
                // VERIFIKASI KE DATABASE FIREBASE (V10)
                const userData = await verifyLogin(userVal, pin);
                
                sessionStorage.setItem("loggedInUser", userVal); 
                sessionStorage.setItem("loggedInName", userData.julukan);
                sessionStorage.setItem("userRole", userData.role); // Simpan Role (admin/direktur/mentor)

                // ROUTING OTOMATIS SESUAI ROLE!
                if(userData.role === "admin") window.location.replace("superuser.html");
                else if(userData.role === "direktur") window.location.replace("direktur.html");
                else window.location.replace("mentor.html");

            } catch (error) {
                alert(error.message);
                btn.disabled = false; txt.classList.remove('d-none'); load.classList.add('d-none');
            }
        };
    </script>
</body>
</html>
