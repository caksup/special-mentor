<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AEC Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .login-card { max-width: 380px; width: 100%; border-radius: 24px; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.05); background: #fff; padding: 2.5rem 2rem; }
        .logo-icon { font-size: 3.5rem; color: #0d6efd; line-height: 1; margin-bottom: 10px; }
        .form-control-custom { border-radius: 12px; padding: 12px 15px; border: 1px solid #e2e8f0; background-color: #f1f5f9; font-weight: 600; font-size: 0.95rem; }
        .form-control-custom:focus { background-color: #fff; border-color: #0d6efd; box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1); }
        .btn-login { border-radius: 12px; padding: 12px; font-weight: 700; font-size: 1.05rem; letter-spacing: 0.5px; transition: all 0.3s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(13, 110, 253, 0.2); }
    </style>
</head>
<body>

    <!-- TOAST / POP-UP MODERN (Pengganti Alert Wagu) -->
    <div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 9999;">
        <div id="liveToast" class="toast align-items-center border-0 shadow-lg rounded-4" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-bold text-white text-sm px-3 py-3" id="toastMessage">Pesan di sini</div>
                <button type="button" class="btn-close btn-close-white me-3 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div class="container px-3">
        <div class="login-card mx-auto text-center">
            <i class="bi bi-layers-half logo-icon text-primary"></i>
            <h3 class="fw-bold text-dark mb-1" style="letter-spacing: -0.5px;">AEC HUB</h3>
            <p class="text-muted small fw-medium mb-4">Sistem Manajemen Terpadu V13</p>

            <form id="loginForm" autocomplete="off">
                <div class="mb-3 text-start">
                    <label class="form-label text-xs fw-bold text-secondary ms-1 mb-1">USERNAME</label>
                    <input type="text" id="username" class="form-control form-control-custom text-lowercase" placeholder="Ketik ID Anda..." required>
                </div>

                <!-- DROPDOWN HANDLE SCHOOL (Disembunyikan dhisik tekan mesin mburi siap) -->
                <div class="mb-3 text-start d-none" id="areaSchool">
                    <label class="form-label text-xs fw-bold text-primary ms-1 mb-1"><i class="bi bi-building"></i> HANDLE SCHOOL</label>
                    <select id="selectSchool" class="form-select form-control-custom text-dark fw-bold border-primary bg-primary bg-opacity-10">
                        <!-- Pilihan otomatis ditampilke kene mengko -->
                    </select>
                </div>

                <div class="mb-4 text-start">
                    <label class="form-label text-xs fw-bold text-secondary ms-1 mb-1">PIN KEAMANAN</label>
                    <input type="password" id="pin" class="form-control form-control-custom font-monospace" placeholder="••••" inputmode="numeric" required>
                </div>

                <button type="submit" class="btn btn-primary btn-login w-100" id="btnLogin">
                    MASUK SISTEM <i class="bi bi-box-arrow-in-right ms-2"></i>
                </button>
            </form>
            
            <div class="mt-4 text-xs text-muted fw-bold">
                <i class="bi bi-shield-check text-success fs-6 align-middle me-1"></i> Dilindungi Enkripsi Firebase
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { verifyLogin } from './script.js?v=13';

        // MESIN POP-UP MODERN
        window.showPopup = function(pesan, tipe = "error") {
            const toastEl = document.getElementById('liveToast');
            const toastMsg = document.getElementById('toastMessage');
            
            // Resik-resik werno lawas
            toastEl.classList.remove('text-bg-danger', 'text-bg-success', 'text-bg-warning');
            
            if (tipe === "error") { 
                toastEl.classList.add('text-bg-danger'); 
                toastMsg.innerHTML = `<i class="bi bi-exclamation-octagon-fill me-2 fs-5 align-middle"></i> ${pesan}`; 
            } else if (tipe === "success") { 
                toastEl.classList.add('text-bg-success'); 
                toastMsg.innerHTML = `<i class="bi bi-check-circle-fill me-2 fs-5 align-middle"></i> ${pesan}`; 
            } else { 
                toastEl.classList.add('text-bg-warning', 'text-dark'); 
                toastMsg.classList.replace('text-white', 'text-dark'); 
                toastMsg.innerHTML = `<i class="bi bi-info-circle-fill me-2 fs-5 align-middle"></i> ${pesan}`; 
            }
            
            const toast = new bootstrap.Toast(toastEl, { delay: 3500 });
            toast.show();
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('pin').value.trim();

            if (!u || !p) { showPopup("Username lan PIN wajib diisi, Bolo!", "error"); return; }

            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Memproses...`; 
            btn.disabled = true;

            try {
                const userData = await verifyLogin(u, p);
                showPopup(`Login Sukses! Sugeng rawuh, ${userData.julukan}...`, "success");
                
                // SIMPAN DATA LOGIN
                sessionStorage.setItem("loggedInUser", u);
                sessionStorage.setItem("loggedInName", userData.julukan);
                sessionStorage.setItem("userRole", userData.role);

                // REDIRECT BERDASARKAN ROLE
                setTimeout(() => {
                    if (userData.role === "admin") window.location.replace("superuser.html");
                    else if (userData.role === "direktur") window.location.replace("direktur.html");
                    else window.location.replace("mentor.html");
                }, 1500);

            } catch (error) {
                showPopup(error.message, "error");
                btn.innerHTML = `MASUK SISTEM <i class="bi bi-box-arrow-in-right ms-2"></i>`; 
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
