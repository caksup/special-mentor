<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEC Hub - Portal Akses</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f8f9fa; }
        .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { max-width: 400px; width: 100%; background: #ffffff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }
        .login-header { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); padding: 30px 20px; text-align: center; color: white; }
        .login-header i { font-size: 3rem; margin-bottom: 10px; display: inline-block; }
        .login-body { padding: 30px; }
        .form-floating > .form-control:focus ~ label { color: #0d6efd; }
        .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25); }
        .btn-login { padding: 12px; font-weight: 700; font-size: 1.1rem; border-radius: 10px; letter-spacing: 0.5px; }
        .custom-popup { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1050; display: none; min-width: 300px; text-align: center; font-weight: bold; padding: 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.15); animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } }
    </style>
</head>
<body>

    <div id="statusPopup" class="custom-popup"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <i class="bi bi-rocket-takeoff-fill"></i>
                <h4 class="fw-bold mb-0">AEC HUB</h4>
                <p class="mb-0 text-white-50" style="font-size: 0.85rem;">Sistem Manajemen Pengajar</p>
            </div>
            
            <div class="login-body">
                <div class="text-center mb-4">
                    <h5 class="fw-bold text-dark">Selamat Datang</h5>
                    <span class="text-muted small">Silakan login untuk mengakses panel Anda</span>
                </div>

                <div class="form-floating mb-3">
                    <input type="text" class="form-control fw-bold text-primary" id="username" placeholder="Username" autocomplete="off">
                    <label for="username"><i class="bi bi-person-fill me-2 text-muted"></i>Username</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control fw-bold text-danger" id="pin" placeholder="PIN" autocomplete="off" inputmode="numeric">
                    <label for="pin"><i class="bi bi-shield-lock-fill me-2 text-muted"></i>PIN Keamanan</label>
                </div>
                
                <button class="btn btn-primary w-100 btn-login shadow-sm" id="btnLogin">MASUK SISTEM</button>
                
                <div class="text-center mt-4">
                    <span class="badge bg-light text-secondary border">V16.0 Stable</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { verifyLogin } from './script.js?v=16';

        function showPopup(message, type) {
            const popup = document.getElementById("statusPopup");
            popup.innerHTML = message;
            popup.className = `custom-popup bg-${type === 'success' ? 'success' : 'danger'} text-white border border-${type === 'success' ? 'success' : 'danger'}`;
            popup.style.display = 'block';
            setTimeout(() => { popup.style.display = 'none'; }, 3000);
        }

        document.getElementById("btnLogin").onclick = async () => {
            const btn = document.getElementById("btnLogin");
            const u = document.getElementById("username").value.trim().toLowerCase();
            const p = document.getElementById("pin").value.trim();

            if (!u || !p) return showPopup("<i class='bi bi-exclamation-triangle-fill me-2'></i> Isi Username & PIN!", "error");

            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> MEMPROSES...`;
            btn.disabled = true;

            try {
                // Proses Login menyang script.js
                const userData = await verifyLogin(u, p);
                
                // Simpan Data menyang Session (Nggowo tugas assignedSchool)
                sessionStorage.setItem("loggedInUser", u);
                sessionStorage.setItem("loggedInName", userData.julukan);
                sessionStorage.setItem("userRole", userData.role);
                sessionStorage.setItem("assignedSchool", userData.assignedSchool || "");

                showPopup(`<i class="bi bi-check-circle-fill me-2"></i> Akses Diterima, ${userData.julukan}!`, "success");

                // Pindah Kamar sesuai Role
                setTimeout(() => {
                    if (userData.role === "admin") {
                        window.location.replace("superuser.html");
                    } else if (userData.role === "direktur") {
                        window.location.replace("direktur.html");
                    } else {
                        window.location.replace("mentor.html");
                    }
                }, 1000);

            } catch (error) {
                showPopup(`<i class="bi bi-x-octagon-fill me-2"></i> ${error.message}`, "error");
                btn.innerHTML = "MASUK SISTEM";
                btn.disabled = false;
            }
        };

        document.getElementById("pin").addEventListener("keypress", function(e) {
            if (e.key === "Enter") { e.preventDefault(); document.getElementById("btnLogin").click(); }
        });
    </script>
</body>
</html>
