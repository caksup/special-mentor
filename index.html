<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Mentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="app" class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <!-- Login Form -->
        <div id="loginSection">
            <h2 class="text-xl font-bold mb-4">Login Mentor</h2>
            <input type="email" id="email" class="w-full border p-2 mb-2" placeholder="Email">
            <input type="password" id="pass" class="w-full border p-2 mb-4" placeholder="Password">
            <button id="btnLogin" class="w-full bg-blue-600 text-white p-2 rounded">Login</button>
        </div>

        <!-- Logbook Form (Disembunyikan saat awal) -->
        <div id="logbookSection" class="hidden">
            <h2 class="text-xl font-bold mb-4">Logbook Harian</h2>
            <div class="space-y-2 mb-4">
                <label class="block"><input type="checkbox" value="Greeting" class="mr-2"> Greeting & Ice Breaking</label>
                <label class="block"><input type="checkbox" value="Review" class="mr-2"> Review Materi</label>
                <label class="block"><input type="checkbox" value="Praktik" class="mr-2"> Sesi Praktik</label>
            </div>
            <textarea id="notes" class="w-full border p-2 mb-4" placeholder="Catatan tambahan..."></textarea>
            <button id="btnSave" class="w-full bg-green-600 text-white p-2 rounded">Simpan Logbook</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // GANTI DENGAN CONFIG ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyCgXGAww1dMu4eWzA1clUiOQht1DzxHl4A",
            authDomain: "special-mentor.firebaseapp.com",
            projectId: "special-mentor",
            storageBucket: "special-mentor.firebasestorage.app",
            messagingSenderId: "1075582532703",
            appId: "1:1075582532703:web:969365cefff8999335efea"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Login Logic
        document.getElementById("btnLogin").onclick = async () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("pass").value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                document.getElementById("loginSection").classList.add("hidden");
                document.getElementById("logbookSection").classList.remove("hidden");
            } catch(e) { alert("Login Gagal!"); }
        };

        // Save Logic
        document.getElementById("btnSave").onclick = async () => {
            const checked = Array.from(document.querySelectorAll('input:checked')).map(el => el.value);
            const notes = document.getElementById("notes").value;
            await addDoc(collection(db, "logbooks"), {
                materi: checked,
                notes: notes,
                mentor: auth.currentUser.email,
                date: new Date().toLocaleDateString()
            });
            alert("Berhasil!");
        };
    </script>
</body>
</html>
