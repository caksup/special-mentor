<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login AEC Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow-sm" style="width: 350px;">
        <h4 class="fw-bold text-center mb-4">AEC Hub Login</h4>
        <div class="mb-3">
            <input type="text" id="username" class="form-control" placeholder="Username">
        </div>
        <div class="mb-3">
            <input type="password" id="pin" class="form-control" placeholder="PIN">
        </div>
        <button id="btnLogin" class="btn btn-primary w-100 fw-bold">LOGIN</button>
    </div>

    <script type="module">
        import { verifyLogin } from './script.js?v=15';

        document.getElementById("btnLogin").onclick = async () => {
            const u = document.getElementById("username").value.trim().toLowerCase();
            const p = document.getElementById("pin").value.trim();
            
            try {
                // Panggil fungsi login dari script.js
                const userData = await verifyLogin(u, p);
                
                // Simpan Data
                sessionStorage.setItem("loggedInName", userData.julukan);
                sessionStorage.setItem("userRole", userData.role);
                sessionStorage.setItem("assignedSchool", userData.assignedSchool || "");
                
                // Redirect Sesuai Role
                if (userData.role === "admin") {
                    window.location.replace("superuser.html");
                } else {
                    window.location.replace("mentor.html");
                }
            } catch (err) {
                alert(err.message);
            }
        };
    </script>
</body>
</html>
